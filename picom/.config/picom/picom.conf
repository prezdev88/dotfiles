# Pretty + stable profile for i3 + picom

#################################
# Backend and stability
#################################
backend = "glx";
vsync = true;
use-damage = false;
unredir-if-possible = false;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-transient = true;
detect-client-leader = true;
detect-rounded-corners = true;
log-level = "warn";

#################################
# Shadows
#################################
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.48;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-exclude = [
  "class_g ?= 'i3-frame'",
  "class_g = 'Conky'",
  "name = 'conky'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Fading (subtle)
#################################
fading = true;
fade-delta = 7;
fade-in-step = 0.025;
fade-out-step = 0.025;

#################################
# Opacity
#################################
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
detect-client-opacity = true;

opacity-rule = [
  "92:class_g = 'URxvt'",
  "95:class_g = 'Alacritty'",
  "95:class_g = 'kitty'",
  "97:class_g = 'Anki'",
  "75:class_g = 'i3bar'"
];

#################################
# Blur (very light)
#################################
blur-background = false;
blur-method = "none";
blur-strength = 0;

#################################
# Window type tweaks
#################################
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1; focus = true; full-shadow = false; };
  dock = { shadow = false; opacity = 0.95; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.98; };
};

dropdown_menu = { shadow = false; };
popup_menu = { shadow = false; };
utility = { shadow = true; };
