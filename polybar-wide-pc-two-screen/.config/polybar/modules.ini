[module/systray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.red}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/filesystem]
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.grey}
type = internal/fs
interval = 25

mount-0 = /

fixed-values = true

label-mounted = %free% (%percentage_used%%)

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.red}
label = %percentage:2%%

[module/clock]
format-prefix = " "
format-prefix-foreground = ${colors.yellow}
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = ${colors.primary}

[module/date]
type = custom/script
exec = date "+%a, %d %b"
interval = 60
label = %{T3}%output%
format-prefix = " "
format-prefix-foreground = ${colors.blue}

[module/arch_updates]
type = custom/script
exec = ~/.config/polybar/scripts/arch_updates.sh
interval = 600
label = %{F#03A9F4}%{F-} %output%
click-left = xfce4-terminal --command "bash -c 'sudo pacman -Syu; read -p \"Presiona Enter para cerrar...\"'"
click-middle = xfce4-terminal --command "bash -c 'checkupdates; read -p \"Presiona Enter para cerrar...\"'"

[module/aur_updates]
type = custom/script
exec = ~/.config/polybar/scripts/aur_updates.sh
interval = 600
label = %{F#e64a19}%{F-} %output%
click-left = xfce4-terminal --command "bash -c 'yay -Syu; read -p \"Presiona Enter para cerrar...\"'"
click-middle = xfce4-terminal --command "bash -c 'yay -Qua; read -p \"Presiona Enter para cerrar...\"'"

[module/kernel]
type = custom/script
exec = ~/.config/polybar/scripts/kernel.sh
interval = 3600
label = %{F#FFFF00}%{F-} %output%

[module/redshift]
type = custom/script
exec = ~/.config/polybar/scripts/redshift.sh
interval = 10
label = %{F#FFB300}%{F-} %output%

[module/current-sink]
type = custom/script
exec = ~/.config/polybar/scripts/current_sink.sh
interval = 5
label = %{F#03A9F4}%{F-} %output%

[module/network-speed]
type = custom/script
exec = ~/.config/polybar/scripts/network_speed.sh
interval = 1
label = %output%

[module/polyrestart]
type = custom/script
exec = echo "%{F#03A9F4}%{F-}"
interval = 86400
click-left = bash -c '(~/.config/polybar/launch.sh)'

[module/cpu_temp]
type = custom/script
exec = sensors | grep "Package id 0" | awk '{print $4}'
interval = 5
label = "%{F#F57C00}%{F-} %{F#F57C00}%output%%{F-}"

[module/weather]
type = custom/script
exec = ~/.config/polybar/scripts/weather.sh
interval = 300
label = %output%
click-left = bash -c 'notify-send "Clima en Talca" "$(~/.config/polybar/scripts/weather.sh --details)"'

[module/brent-price]
type = custom/script
exec = ~/.config/polybar/scripts/brent_price.sh
interval = 900
label = %output%
